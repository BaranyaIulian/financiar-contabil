services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: corebill
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    environment:
      PORT: 3000
      NODE_ENV: production
      CORS_ORIGIN: "*"
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/corebill?schema=public
      JWT_ACCESS_SECRET: change_me_access
      JWT_REFRESH_SECRET: change_me_refresh
    depends_on:
      - postgres
    ports:
      - "3000:3000"
    command: ["sh", "-lc", "npx prisma migrate deploy && node dist/index.js"]

volumes:
  pgdata:
